name: openrgb-install
type: shell
sources:
- type: file
  url: https://codeberg.org/OpenRGB/OpenRGB/releases/download/release_candidate_1.0rc3/openrgb_1.0rc3_amd64_trixie_6fbcf62.deb
  checksum: d9c9d83c1f9d49bc9b3a614448e16662520770150e679740fab65878717010cf
  only-arches: [amd64]
- type: file
  url: https://codeberg.org/OpenRGB/OpenRGB/releases/download/release_candidate_1.0rc3/openrgb_1.0rc3_arm64_trixie_6fbcf62.deb
  checksum: e4eed2f56b6b8e7cfcdcbe82bb850f657eb01eda41bb099c5ea20cb709713a0f
  only-arches: [arm64]
commands:
  - mv /sources/openrgb-install/openrgb_1.0rc3_*_trixie_6fbcf62/openrgb-install.deb /sources/openrgb-install/openrgb.deb
  - apt-get install -y /sources/openrgb-install/openrgb.deb

modules:
- name: openrgb-install-deps
  type: apt
  sources:
    - packages:
      - i2c-tools
      # - openrgb-dkms-drivers
      - qgnomeplatform-qt5

- name: openrgb-install-plugins
  type: shell
  sources:
    # Effects
    - type: file
      url: https://codeberg.org/OpenRGB/OpenRGBEffectsPlugin/releases/download/release_candidate_1.0rc2/OpenRGBEffectsPlugin_1.0rc2_Linux_amd64_415dc20.so
      checksum: 2f3c2b3c2c850e7148b4aa459bd41ccf9c56bd26fd00809fa19126ac5ad8dbc0
      only-arches: [amd64]
    - type: file
      url: https://codeberg.org/OpenRGB/OpenRGBEffectsPlugin/releases/download/release_candidate_1.0rc2/OpenRGBEffectsPlugin_1.0rc2_Linux_arm64_415dc20.so
      checksum: e8689c57c5369c00611bb3ed046d26df33183dadfddd2763ab5b9b82b0a303d8
      only-arches: [arm64]

    # Visual Map
    - type: file
      url: https://codeberg.org/OpenRGB/OpenRGBVisualMapPlugin/releases/download/release_candidate_1.0rc2/OpenRGBVisualMapPlugin_1.0rc2_Linux_amd64_320420d.so
      checksum: 359ed9d9dc9f5138333d1bf0c0bab1e99154988a63582653622cb779b3893024
      only-arches: [amd64]
    - type: file
      url: https://codeberg.org/OpenRGB/OpenRGBVisualMapPlugin/releases/download/release_candidate_1.0rc2/OpenRGBVisualMapPlugin_1.0rc2_Linux_arm64_320420d.so
      checksum: d7feca494c63d265379c10b015de32632b1d09b30195acf0a231abbd5283f3ce
      only-arches: [arm64]

    # HardwareSync
    - type: file
      url: https://codeberg.org/OpenRGB/OpenRGBHardwareSyncPlugin/releases/download/release_candidate_1.0rc2/OpenRGBHardwareSyncPlugin_1.0rc2_Linux_amd64_4aed949.so
      checksum: 1ff0b969a84f24c906e137c494a8b70e6e1897bbc24fa97092c1a07536f60fda
      only-arches: [amd64]
    - type: file
      url: https://codeberg.org/OpenRGB/OpenRGBHardwareSyncPlugin/releases/download/release_candidate_1.0rc2/OpenRGBHardwareSyncPlugin_1.0rc2_Linux_arm64_4aed949.so
      checksum: 34c6815321829363b120f97c71a0662136e728f1763514aa72a84d6029ad00b4
      only-arches: [arm64]

    # E131 Reciever
    - type: file
      url: https://codeberg.org/OpenRGB/OpenRGBE131ReceiverPlugin/releases/download/release_candidate_1.0rc2/OpenRGBE131ReceiverPlugin_1.0rc2_Linux_amd64_d765325.so
      checksum: 21e439349150dfdb6c75f69a67fdc0f1afcdcacbe99908a69e487b75078a7000
      only-arches: [amd64]
    - type: file
      url: https://codeberg.org/OpenRGB/OpenRGBE131ReceiverPlugin/releases/download/release_candidate_1.0rc2/OpenRGBE131ReceiverPlugin_1.0rc2_Linux_arm64_d765325.so
      checksum: 51c2807aed19c70d25722d73b04101e6507af2263d058d5835fe039532d0c164
      only-arches: [arm64]
  commands:
    - mkdir -p /usr/lib/openrgb
    - mkdir -p /usr/lib/openrgb/plugins
    - mv /sources/openrgb-install-plugins/OpenRGBEffectsPlugin_1.0rc2_Linux_*_415dc20/openrgb-install-plugins.so /usr/lib/openrgb/plugins/OpenRGBEffectsPlugin_1.0rc2.so
    - mv /sources/openrgb-install-plugins/OpenRGBVisualMapPlugin_1.0rc2_Linux_*_320420d/openrgb-install-plugins.so /usr/lib/openrgb/plugins/OpenRGBVisualMapPlugin_1.0rc2.so
    - mv /sources/openrgb-install-plugins/OpenRGBHardwareSyncPlugin_1.0rc2_Linux_*_4aed949/openrgb-install-plugins.so /usr/lib/openrgb/plugins/OpenRGBHardwareSyncPlugin_1.0rc2.so
    - mv /sources/openrgb-install-plugins/OpenRGBE131ReceiverPlugin_1.0rc2_Linux_*_d765325/openrgb-install-plugins.so /usr/lib/openrgb/plugins/OpenRGBE131ReceiverPlugin_1.0rc2.so

